<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Encuentra la pelota</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<video autoplay muted playsinline id="video">
    <source src="susto.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

// intenta reproducir apenas carga
video.play().catch(() => {
    console.log("Autoplay bloqueado por el navegador");
});
</script>

</body>
</html>
