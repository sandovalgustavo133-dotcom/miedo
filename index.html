<!DOCTYPE html>
<html>
<head>
    <title>Mira esta foto increíble</title>
</head>
<body>
    <img src="foto.jpg" width="600">
    <p>Haz clic en la imagen para ampliarla</p>

    <video id="jumpscare" style="display:none;" src="susto.mp4"></video>

    <script>
        document.querySelector("img").onclick = async function() {
            const video = document.getElementById("jumpscare");

            this.style.display = "none";
            video.style.display = "block";

            if (video.requestFullscreen) {
                await video.requestFullscreen();
            }

            video.play();
        };
    </script>
</body>
</html>
