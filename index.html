<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Encuentra la pelota</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<video id="video" autoplay muted playsinline>
    <source src="susto.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

// fuerza carga limpia
video.load();

// intenta reproducir sí o sí
const playPromise = video.play();

if (playPromise !== undefined) {
    playPromise.catch(() => {
        // si el navegador bloquea, reintenta apenas haya interacción
        document.body.addEventListener("click", () => {
            video.play();
        });
    });
}
</script>

</body>
</html>
