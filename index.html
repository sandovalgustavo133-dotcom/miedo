<!DOCTYPE html>
<html>
<head>
    <title>Encuentra la pelota</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
    </style>
</head>

<body>

<video id="video" autoplay muted playsinline>
    <source src="susto.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

// intenta reproducir apenas carga
window.onload = async () => {
    try {
        await video.play();

        // intenta fullscreen (puede ser bloqueado por el navegador)
        if (video.requestFullscreen) {
            await video.requestFullscreen().catch(() => {});
        }

    } catch (e) {
        console.log("Autoplay bloqueado");
    }
};
</script>

</body>
</html>
